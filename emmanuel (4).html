<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<title>Emmanuel · Lessons</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #F2F1EC;
  --card: #FFFFFF;
  --border: #E4E2DA;
  --text: #1A1917;
  --muted: #9A9589;
  --soft: #F8F7F3;
  --green: #1E6B45;
  --green-bg: #E4F4EC;
  --green-border: #A3D9BC;
  --red: #B91C1C;
  --red-bg: #FEF2F2;
  --red-border: #FECACA;
  --orange-bg: #FFF7ED;
  --orange-border: #FED7AA;
  --orange: #C2410C;
  --col-blue:#3B82F6; --col-teal:#0D9488; --col-purple:#7C3AED;
  --col-coral:#F97316; --col-amber:#D97706; --col-green:#16A34A;
  --col-pink:#EC4899; --col-gray:#6B7280;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px;max-width:480px;margin:0 auto}

.header{background:var(--card);padding:16px 16px 12px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.header-name{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.week-nav{display:flex;align-items:center;gap:8px}
.week-nav button{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:var(--soft);color:var(--text);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.week-label{font-size:13px;font-weight:500}
.tz-bar{display:flex;gap:4px;align-items:center}
.tz-lbl{font-size:11px;color:var(--muted);margin-right:3px}
.tz-btn{padding:4px 9px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Inter',sans-serif;font-size:11px;font-weight:500;cursor:pointer}
.tz-btn.active{background:var(--text);color:#fff;border-color:var(--text)}

.summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--border);border-bottom:1px solid var(--border);margin-bottom:14px}
.sum-item{background:var(--card);padding:10px 6px;text-align:center}
.sum-val{font-size:20px;font-weight:600;line-height:1.1}
.sum-val.green{color:var(--green)}
.sum-lbl{font-size:10px;color:var(--muted);margin-top:2px}

.content{padding:0 12px}
.day-group{margin-bottom:16px}
.day-heading{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);padding:0 4px 6px}
.day-heading.today{color:var(--green)}

.lesson{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:7px;position:relative;overflow:hidden;transition:all .2s}
.lesson::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px}
.lesson.done{background:var(--green-bg);border-color:var(--green-border)}
.lesson.cancelled{background:var(--red-bg);border-color:var(--red-border);opacity:.7}
.lesson.rescheduled{background:var(--orange-bg);border-color:var(--orange-border)}

.lesson.c-blue::before{background:var(--col-blue)}
.lesson.c-teal::before{background:var(--col-teal)}
.lesson.c-purple::before{background:var(--col-purple)}
.lesson.c-coral::before{background:var(--col-coral)}
.lesson.c-amber::before{background:var(--col-amber)}
.lesson.c-green::before{background:var(--col-green)}
.lesson.c-pink::before{background:var(--col-pink)}
.lesson.c-gray::before{background:var(--col-gray)}

.lesson-info{flex:1;min-width:0;padding-left:8px}
.lesson-name{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lesson.done .lesson-name{text-decoration:line-through;color:var(--muted)}
.lesson.cancelled .lesson-name{text-decoration:line-through;color:var(--red)}
.lesson-meta{font-size:12px;color:var(--muted);margin-top:2px}
.lesson-badge{display:inline-block;font-size:10px;font-weight:600;padding:1px 7px;border-radius:10px;margin-top:4px}
.badge-done{background:var(--green-bg);color:var(--green)}
.badge-cancelled{background:var(--red-bg);color:var(--red)}
.badge-rescheduled{background:var(--orange-bg);color:var(--orange)}

.lesson-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.lesson-earn{font-size:13px;font-weight:600;color:var(--green)}
.lesson.done .lesson-earn{color:var(--muted)}
.lesson.cancelled .lesson-earn{color:var(--muted);text-decoration:line-through}

.done-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border);background:var(--soft);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0}
.done-btn:active{transform:scale(.88)}
.done-btn.checked{background:var(--green);border-color:var(--green)}
.done-btn svg{display:block;pointer-events:none}

.more-btn{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:16px;flex-shrink:0;line-height:1}

/* ACTION SHEET */
.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.sheet-bg.hidden{display:none}
.sheet{background:var(--card);border-radius:20px 20px 0 0;padding:8px 0 30px;width:100%;max-width:480px}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:4px;margin:8px auto 16px}
.sheet-title{font-size:13px;font-weight:600;color:var(--muted);padding:0 20px 10px;text-transform:uppercase;letter-spacing:.08em}
.sheet-action{display:flex;align-items:center;gap:14px;padding:13px 20px;cursor:pointer;font-size:15px;font-weight:500;transition:background .1s}
.sheet-action:active{background:var(--soft)}
.sheet-action svg{flex-shrink:0}
.sheet-action.danger{color:var(--red)}
.sheet-action.warn{color:var(--orange)}
.sheet-sep{height:1px;background:var(--border);margin:4px 0}

/* RESCHEDULE INPUT */
.reschedule-form{padding:12px 20px 0}
.reschedule-form label{font-size:12px;color:var(--muted);display:block;margin-bottom:6px}
.reschedule-form input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px;font-family:'Inter',sans-serif;font-size:15px;background:var(--soft);color:var(--text)}
.reschedule-form .confirm-btn{margin-top:10px;width:100%;padding:12px;background:var(--text);color:#fff;border:none;border-radius:12px;font-family:'Inter',sans-serif;font-size:15px;font-weight:500;cursor:pointer}
.day-picker{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:4px}
.day-pick-btn{flex:1;min-width:36px;padding:7px 4px;border:1px solid var(--border);border-radius:8px;background:var(--soft);color:var(--muted);font-family:'Inter',sans-serif;font-size:12px;font-weight:500;cursor:pointer;text-align:center}
.day-pick-btn.selected{background:var(--text);color:#fff;border-color:var(--text)}

.undo-bar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1A1917;color:#fff;border-radius:30px;padding:10px 16px;display:flex;align-items:center;gap:12px;font-size:13px;font-weight:500;z-index:300;box-shadow:0 4px 20px rgba(0,0,0,.2);transition:opacity .3s;white-space:nowrap}
.undo-bar.hidden{opacity:0;pointer-events:none}
.undo-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}

.state-msg{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px;line-height:1.8}
.spinner{width:26px;height:26px;border:2.5px solid var(--border);border-top-color:var(--text);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <span class="header-name">Emmanuel · Lessons</span>
    <div class="week-nav">
      <button id="prevWeek">&#8592;</button>
      <span class="week-label" id="weekLabel"></span>
      <button id="nextWeek">&#8594;</button>
    </div>
  </div>
  <div class="tz-bar">
    <span class="tz-lbl">Time zone:</span>
    <button class="tz-btn" data-offset="2">🇪🇺 EU</button>
    <button class="tz-btn active" data-offset="1">🇳🇬 NG</button>
    <button class="tz-btn" data-offset="3">🇺🇦 UA</button>
  </div>
</div>

<div class="summary">
  <div class="sum-item"><div class="sum-val" id="sDone">—</div><div class="sum-lbl">Done</div></div>
  <div class="sum-item"><div class="sum-val" id="sLeft">—</div><div class="sum-lbl">Left</div></div>
  <div class="sum-item"><div class="sum-val green" id="sPay">—</div><div class="sum-lbl">Earned ₴</div></div>
</div>

<div class="content" id="content">
  <div class="state-msg"><div class="spinner"></div>Loading...</div>
</div>

<!-- ACTION SHEET -->
<div class="sheet-bg hidden" id="sheetBg">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheetTitle">Lesson</div>
    <div id="sheetActions"></div>
    <div class="reschedule-form hidden" id="rescheduleForm">
      <label>New day</label>
      <div class="day-picker" id="dayPicker">
        <button class="day-pick-btn" data-day="Mon">Mon</button>
        <button class="day-pick-btn" data-day="Tue">Tue</button>
        <button class="day-pick-btn" data-day="Wed">Wed</button>
        <button class="day-pick-btn" data-day="Thu">Thu</button>
        <button class="day-pick-btn" data-day="Fri">Fri</button>
        <button class="day-pick-btn" data-day="Sat">Sat</button>
        <button class="day-pick-btn" data-day="Sun">Sun</button>
      </div>
      <label style="margin-top:12px;display:block">New time</label>
      <input type="time" id="newTimeInput"/>
      <button class="confirm-btn" id="confirmReschedule">Confirm reschedule</button>
    </div>
  </div>
</div>

<div class="undo-bar hidden" id="undoBar">
  <span id="undoText">Marked as done</span>
  <button class="undo-btn" id="undoBtn">Undo</button>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbx0s4Lk7H2v0sbGLGeIpuC7_0NoF68vZmZL58zw7oHb42FAw3ByGkIBGrGRjWgBKGJTkQ/exec';

const DAY_ORDER = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const DAY_FULL = {Mon:'Monday',Tue:'Tuesday',Wed:'Wednesday',Thu:'Thursday',Fri:'Friday',Sat:'Saturday',Sun:'Sunday'};

let lessons = [];
let tzOffset = 1;
let weekOffset = 0;
let undoTimer = null;
let lastUndoRow = null;
let activeRow = null;

function getWeekLabel(off) {
  const now = new Date();
  const d = now.getDay();
  const diff = d === 0 ? -6 : 1 - d;
  const mon = new Date(now);
  mon.setDate(now.getDate() + diff + off * 7);
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  const fmt = x => x.getDate() + ' ' + x.toLocaleDateString('en-GB', {month:'short'});
  return fmt(mon) + ' – ' + fmt(sun);
}

function getTodayDay() {
  const d = new Date().getDay();
  return DAY_ORDER[d === 0 ? 6 : d - 1];
}

function shiftTime(t, from, to) {
  if (!t) return '—';
  const s = String(t).trim();
  // Handle "HH:mm" format only
  const match = s.match(/^(\d{1,2}):(\d{2})$/);
  if (!match) return s; // return as-is if already looks like text
  const h = parseInt(match[1]), m = parseInt(match[2]);
  let mins = h * 60 + m - from * 60 + to * 60;
  mins = ((mins % 1440) + 1440) % 1440;
  return String(Math.floor(mins/60)).padStart(2,'0') + ':' + String(mins%60).padStart(2,'0');
}

function fmtDur(min) {
  const m = Number(min);
  if (m < 60) return m + ' min';
  if (m % 60 === 0) return (m/60) + ' hr';
  return Math.floor(m/60) + 'h ' + (m%60) + 'm';
}

function renderSummary() {
  const done = lessons.filter(l => l.status === 'Yes').length;
  const left = lessons.filter(l => l.status === 'No').length;
  const earned = lessons.filter(l => l.status === 'Yes').reduce((s,l) => s + Number(l.amount), 0);
  document.getElementById('sDone').textContent = done;
  document.getElementById('sLeft').textContent = left;
  document.getElementById('sPay').textContent = earned.toLocaleString('uk-UA');
}

function statusClass(s) {
  if (s === 'Yes') return ' done';
  if (s === 'Cancelled') return ' cancelled';
  if (s === 'Rescheduled') return ' rescheduled';
  return '';
}

function renderLessons() {
  document.getElementById('weekLabel').textContent = getWeekLabel(weekOffset);
  const content = document.getElementById('content');
  if (!lessons.length) {
    content.innerHTML = '<div class="state-msg">No lessons this week.</div>';
    renderSummary(); return;
  }

  const today = getTodayDay();
  const grouped = {};
  DAY_ORDER.forEach(d => grouped[d] = []);
  lessons.forEach(l => { if (grouped[l.day] !== undefined) grouped[l.day].push(l); });

  let html = '';
  DAY_ORDER.forEach(day => {
    const items = grouped[day];
    if (!items.length) return;
    items.sort((a,b) => String(a.time).localeCompare(String(b.time)));
    const isToday = day === today && weekOffset === 0;
    html += `<div class="day-group"><div class="day-heading${isToday?' today':''}">${DAY_FULL[day]}${isToday?' · Today':''}</div>`;
    items.forEach(l => {
      const t = shiftTime(l.time, 2, tzOffset);
      const color = (l.color || 'gray').toLowerCase().trim();
      const sc = statusClass(l.status);
      let badge = '';
      if (l.status === 'Yes') badge = '<span class="lesson-badge badge-done">Done</span>';
      if (l.status === 'Cancelled') badge = '<span class="lesson-badge badge-cancelled">Cancelled</span>';
      if (l.status === 'Rescheduled') badge = `<span class="lesson-badge badge-rescheduled">→ ${l.note || 'Rescheduled'}</span>`;

      const checkIcon = l.status === 'Yes'
        ? `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><polyline points="2.5,8 6,11.5 13.5,4.5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`
        : `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><polyline points="2.5,8 6,11.5 13.5,4.5" stroke="#C0BDB5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

      html += `
      <div class="lesson c-${color}${sc}">
        <div class="lesson-info">
          <div class="lesson-name">${l.name}</div>
          <div class="lesson-meta">${t} · ${fmtDur(l.duration)}</div>
          ${badge}
        </div>
        <div class="lesson-right">
          <div class="lesson-earn">${Number(l.amount).toLocaleString('uk-UA')} ₴</div>
          <div style="display:flex;gap:6px;align-items:center">
            <button class="more-btn" data-row="${l.row}" title="Options">···</button>
            <button class="done-btn${l.status==='Yes'?' checked':''}" data-row="${l.row}">
              ${checkIcon}
            </button>
          </div>
        </div>
      </div>`;
    });
    html += '</div>';
  });

  content.innerHTML = html;

  content.querySelectorAll('.done-btn').forEach(btn => {
    btn.addEventListener('click', () => handleDone(parseInt(btn.dataset.row)));
  });
  content.querySelectorAll('.more-btn').forEach(btn => {
    btn.addEventListener('click', () => openSheet(parseInt(btn.dataset.row)));
  });

  renderSummary();
}

async function handleDone(row) {
  const lesson = lessons.find(l => l.row === row);
  if (!lesson) return;
  if (lesson.status === 'Yes') {
    await callApi({ row, action: 'undo' });
    lesson.status = 'No';
    hideUndo();
  } else {
    await callApi({ row, action: 'done' });
    lesson.status = 'Yes';
    showUndo(row, lesson.name);
  }
  renderLessons();
}

// ── global reschedule state ──
let rescheduleRow = null;
let selectedDay = null;

function initSheetListeners() {
  // Day picker
  document.querySelectorAll('.day-pick-btn').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('.day-pick-btn').forEach(x => x.classList.remove('selected'));
      b.classList.add('selected');
      selectedDay = b.dataset.day;
    });
  });

  // Confirm reschedule — single listener
  document.getElementById('confirmReschedule').addEventListener('click', async () => {
    const newTime = document.getElementById('newTimeInput').value;
    if (!newTime || !selectedDay) { alert('Please select a day and time.'); return; }
    const row = rescheduleRow;
    closeSheet();
    const newTimeWarsaw = shiftTime(newTime, tzOffset, 2);
    const note = selectedDay + ' ' + newTime;
    await callApi({ row, action: 'reschedule', note });
    const l = lessons.find(x => x.row === row);
    if (l) { l.status = 'Rescheduled'; l.note = note; l.day = selectedDay; l.time = newTimeWarsaw; }
    renderLessons();
  });
}

function openSheet(row) {
  activeRow = row;
  rescheduleRow = row;
  const lesson = lessons.find(l => l.row === row);
  if (!lesson) return;

  document.getElementById('sheetTitle').textContent = lesson.name;
  document.getElementById('rescheduleForm').classList.add('hidden');
  document.getElementById('sheetActions').style.display = '';

  let html = '';
  if (lesson.status !== 'Yes') {
    html += `<div class="sheet-action" id="saDone">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="9" stroke="#1E6B45" stroke-width="1.5"/><polyline points="5.5,10 8.5,13 14.5,7" stroke="#1E6B45" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Mark as done
    </div>`;
  }
  if (lesson.status === 'Yes') {
    html += `<div class="sheet-action" id="saUndo">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M4 9C4 6.8 5.8 5 8 5h5" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round"/><polyline points="7,2.5 4,5 7,7.5" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Undo — not done yet
    </div>`;
  }
  html += `<div class="sheet-sep"></div>`;
  html += `<div class="sheet-action warn" id="saReschedule">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="3" y="5" width="14" height="13" rx="2" stroke="#C2410C" stroke-width="1.5"/><path d="M3 9h14" stroke="#C2410C" stroke-width="1.5"/><path d="M7 3v3M13 3v3" stroke="#C2410C" stroke-width="1.5" stroke-linecap="round"/></svg>
    Reschedule
  </div>`;
  html += `<div class="sheet-action danger" id="saCancel">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="9" stroke="#B91C1C" stroke-width="1.5"/><path d="M7 7l6 6M13 7l-6 6" stroke="#B91C1C" stroke-width="1.5" stroke-linecap="round"/></svg>
    Cancel this lesson
  </div>`;

  document.getElementById('sheetActions').innerHTML = html;
  document.getElementById('sheetBg').classList.remove('hidden');

  // Pre-fill reschedule form with current lesson values
  selectedDay = lesson.day;
  document.querySelectorAll('.day-pick-btn').forEach(x => x.classList.remove('selected'));
  const preBtn = document.querySelector(`.day-pick-btn[data-day="${lesson.day}"]`);
  if (preBtn) preBtn.classList.add('selected');
  document.getElementById('newTimeInput').value = shiftTime(lesson.time, 2, tzOffset);

  document.getElementById('saDone') && document.getElementById('saDone').addEventListener('click', async () => {
    closeSheet();
    await callApi({ row, action: 'done' });
    const l = lessons.find(x => x.row === row);
    if (l) { l.status = 'Yes'; showUndo(row, l.name); }
    renderLessons();
  });
  document.getElementById('saUndo') && document.getElementById('saUndo').addEventListener('click', async () => {
    closeSheet();
    await callApi({ row, action: 'undo' });
    const l = lessons.find(x => x.row === row);
    if (l) l.status = 'No';
    renderLessons();
  });
  document.getElementById('saReschedule').addEventListener('click', () => {
    document.getElementById('sheetActions').style.display = 'none';
    document.getElementById('rescheduleForm').classList.remove('hidden');
  });
  document.getElementById('saCancel').addEventListener('click', async () => {
    closeSheet();
    await callApi({ row, action: 'cancel', note: 'Cancelled by teacher' });
    const l = lessons.find(x => x.row === row);
    if (l) { l.status = 'Cancelled'; l.note = ''; }
    renderLessons();
  });
}

function closeSheet() {
  document.getElementById('sheetBg').classList.add('hidden');
  document.getElementById('sheetActions').style.display = '';
  activeRow = null;
}

document.getElementById('sheetBg').addEventListener('click', e => {
  if (e.target === document.getElementById('sheetBg')) closeSheet();
});

async function callApi(payload) {
  try {
    await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify(payload),
      headers: { 'Content-Type': 'text/plain' }
    });
  } catch(e) { console.error(e); }
}

function showUndo(row, name) {
  lastUndoRow = row;
  clearTimeout(undoTimer);
  document.getElementById('undoText').textContent = `"${name}" marked done`;
  document.getElementById('undoBar').classList.remove('hidden');
  undoTimer = setTimeout(hideUndo, 5000);
}

function hideUndo() {
  document.getElementById('undoBar').classList.add('hidden');
  clearTimeout(undoTimer);
  lastUndoRow = null;
}

document.getElementById('undoBtn').addEventListener('click', async () => {
  if (lastUndoRow === null) return;
  const row = lastUndoRow;
  hideUndo();
  await callApi({ row, action: 'undo' });
  const l = lessons.find(x => x.row === row);
  if (l) l.status = 'No';
  renderLessons();
});

async function loadLessons() {
  document.getElementById('content').innerHTML =
    '<div class="state-msg"><div class="spinner"></div>Loading...</div>';
  try {
    const resp = await fetch(API_URL);
    const data = await resp.json();
    lessons = data.lessons || [];
    renderLessons();
  } catch(e) {
    document.getElementById('content').innerHTML =
      '<div class="state-msg">Could not load.<br>Check your connection.</div>';
  }
}

document.getElementById('prevWeek').addEventListener('click', () => { weekOffset--; renderLessons(); });
document.getElementById('nextWeek').addEventListener('click', () => { weekOffset++; renderLessons(); });
document.querySelectorAll('.tz-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tz-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    tzOffset = parseInt(btn.dataset.offset);
    renderLessons();
  });
});

document.getElementById('weekLabel').textContent = getWeekLabel(0);
initSheetListeners();
loadLessons();
</script>
</body>
</html>
